services:
  postgres:
    image: postgres:16-alpine
    container_name: stock-market-sim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sim
      POSTGRES_PASSWORD: sim
      POSTGRES_DB: stock_market_sim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sim -d stock_market_sim"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
